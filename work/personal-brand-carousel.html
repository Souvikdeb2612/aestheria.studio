<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Personal Brand Carousel — Aestheria Studio</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%232A1518'/%3E%3Cg stroke='%237E2230' stroke-width='3' stroke-linecap='round'%3E%3Cpath d='M16 6v20'/%3E%3Cpath d='M7 11l18 10'/%3E%3Cpath d='M25 11 7 21'/%3E%3C/g%3E%3C/svg%3E" />
<style>
:root{--paper:#F8F1E8;--ink:#221813;--muted:#6A5C55;--clay:#A34C2E;--lav:#D8CCE7;--line:rgba(34,24,19,.12)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Hanken Grotesk",Segoe UI,sans-serif;background:radial-gradient(circle at top right,rgba(216,204,231,.65),transparent 34%),linear-gradient(135deg,#fff9f0,#f5ece4);color:var(--ink);min-height:100vh;padding:28px}
a{color:inherit}.wrap{max-width:1120px;margin:auto}.top{display:flex;justify-content:space-between;align-items:center;gap:16px;margin-bottom:28px}.brand{font-weight:800}.back{border:1px solid var(--line);border-radius:4px;padding:10px 16px;text-decoration:none;background:#fff8}.hero{display:grid;grid-template-columns:.9fr 1.1fr;gap:34px;align-items:center}.copy h1{font-size:clamp(2.2rem,5vw,4.2rem);line-height:.98;letter-spacing:-.04em;margin:10px 0 14px}.copy p{color:var(--muted);font-size:1.08rem;max-width:52ch}.pill{display:inline-block;background:#E8D8C8;padding:8px 12px;border-radius:4px;font-weight:800;font-size:.78rem;text-transform:uppercase;letter-spacing:.08em;color:var(--clay)}.phone{background:#f3e6dc;border-radius:42px;padding:18px;box-shadow:0 28px 80px -24px rgba(96,62,43,.35);max-width:520px;margin:auto}.screen{aspect-ratio:1/1;background:#fff7ef;border-radius:30px;overflow:hidden;position:relative}.slide{position:absolute;inset:0;opacity:0;transform:translateX(24px);transition:.35s}.slide.active{opacity:1;transform:none}.slide img{width:100%;height:100%;object-fit:cover;display:block}.nav{display:flex;justify-content:center;align-items:center;gap:14px;margin-top:18px}.nav button{border:0;border-radius:4px;background:var(--clay);padding:12px 18px;font-weight:800;cursor:pointer;color:#fff}.dots{display:flex;gap:8px}.dots i{width:9px;height:9px;border-radius:99px;background:#8d6d5b55;cursor:pointer}.dots i.active{background:var(--clay);width:24px}@media(max-width:820px){body{padding:18px}.hero{grid-template-columns:1fr}.top{align-items:flex-start}.phone{max-width:440px}.copy h1{font-size:2.6rem}}
</style>
</head>
<body>
<div class="wrap">
  <div class="top"><div class="brand">Aestheria Studio</div><a class="back" href="../index.html#portfolio">← Back to portfolio</a></div>
  <main class="hero">
    <section class="copy"><span class="pill">Instagram carousel</span><h1>Personal brand carousel.</h1><p>A soft editorial carousel about building a personal brand through clarity, consistency, storytelling, audience engagement, and long-term trust.</p></section>
    <section class="phone" aria-label="Personal brand carousel preview">
      <div class="screen">
        <article class="slide active"><img src="../assets/carousel-personal-brand-01.jpg" alt="Standing out today is about being clearer personal brand slide"></article>
        <article class="slide"><img src="../assets/carousel-personal-brand-02.jpg" alt="Show up consistently and share stories personal brand slide"></article>
        <article class="slide"><img src="../assets/carousel-personal-brand-03.jpg" alt="Engage with your audience personal brand slide"></article>
        <article class="slide"><img src="../assets/carousel-personal-brand-04.jpg" alt="Focus on long-term trust personal brand slide"></article>
      </div>
      <div class="nav"><button id="prev" type="button">Prev</button><div class="dots" id="dots"></div><button id="next" type="button">Next</button></div>
    </section>
  </main>
</div>
<script>
const slides=[...document.querySelectorAll('.slide')],dots=document.getElementById('dots');let i=0;slides.forEach((_,n)=>dots.innerHTML+='<i></i>');const dot=[...dots.children];function show(n){i=(n+slides.length)%slides.length;slides.forEach((s,k)=>s.classList.toggle('active',k===i));dot.forEach((d,k)=>d.classList.toggle('active',k===i))}prev.onclick=()=>show(i-1);next.onclick=()=>show(i+1);dot.forEach((d,k)=>d.onclick=()=>show(k));show(0);
</script>
</body>
</html>
